<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tradingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="url(#tradingGradient)" opacity="0.1"/>

  <!-- Chart bars -->
  <rect x="10" y="28" width="4" height="8" fill="url(#tradingGradient)" rx="2"/>
  <rect x="18" y="22" width="4" height="14" fill="url(#tradingGradient)" rx="2"/>
  <rect x="26" y="18" width="4" height="18" fill="url(#tradingGradient)" rx="2"/>
  <rect x="34" y="24" width="4" height="12" fill="url(#tradingGradient)" rx="2"/>

  <!-- Upward trend line -->
  <polyline points="10,32 18,26 26,20 34,24" fill="none" stroke="url(#tradingGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
