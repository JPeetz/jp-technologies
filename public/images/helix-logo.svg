<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="helixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="helixGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Double helix DNA strand -->
  <g filter="url(#helixGlow)">
    <!-- Left helix -->
    <path d="M 80 40 Q 100 60, 120 80 Q 140 100, 160 120 Q 180 140, 200 160"
          fill="none" stroke="url(#helixGradient)" stroke-width="12" stroke-linecap="round"/>

    <!-- Right helix -->
    <path d="M 120 40 Q 140 60, 160 80 Q 180 100, 200 120 Q 220 140, 240 160"
          fill="none" stroke="url(#helixGradient)" stroke-width="12" stroke-linecap="round" opacity="0.8"/>

    <!-- Connecting elements -->
    <line x1="90" y1="60" x2="130" y2="70" stroke="url(#helixGradient)" stroke-width="3" opacity="0.6"/>
    <line x1="110" y1="90" x2="170" y2="100" stroke="url(#helixGradient)" stroke-width="3" opacity="0.6"/>
    <line x1="140" y1="120" x2="200" y2="130" stroke="url(#helixGradient)" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Center accent dot -->
  <circle cx="140" cy="100" r="6" fill="url(#helixGradient)" opacity="0.9"/>
</svg>
